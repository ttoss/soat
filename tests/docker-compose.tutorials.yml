services:
  # ── Infrastructure ───────────────────────────────────────────────────────────

  database:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    environment:
      POSTGRES_DB: soat_tutorials
      POSTGRES_USER: soat_user
      POSTGRES_PASSWORD: soat_password
    tmpfs:
      - /var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U soat_user -d soat_tutorials']
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:0.20.6
    volumes:
      - ${HOME}/.ollama:/root/.ollama
    environment:
      OLLAMA_NUM_CTX: '16384'
    entrypoint:
      - /bin/sh
      - -c
      - 'ollama serve & sleep 5 && (ollama list | grep -q qwen3-embedding:0.6b || ollama pull qwen3-embedding:0.6b) && (ollama list | grep -q qwen2.5:0.5b || ollama pull qwen2.5:0.5b) && wait'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'ollama list | grep qwen3-embedding && ollama list | grep qwen2.5:0.5b',
        ]
      interval: 10s
      timeout: 30s
      retries: 60
      start_period: 60s

  # Deterministic stand-ins for the external provider APIs the converter tutorial
  # calls (OpenAI-compatible vision chat-completions + Deepgram-compatible
  # transcription). Lets the flow run without real keys. See tests/mocks/mock-providers.mjs.
  mock-providers:
    image: node:22-alpine
    volumes:
      - ./mocks/mock-providers.mjs:/mock-providers.mjs:ro
    command: ['node', '/mock-providers.mjs']
    environment:
      PORT: '8090'
    healthcheck:
      test:
        - CMD
        - node
        - '-e'
        - >-
          require('http').get('http://localhost:8090/health',
          (r) => process.exit(r.statusCode === 200 ? 0 : 1)
          ).on('error', () => process.exit(1))
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ..
      target: production
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    depends_on:
      database:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      PORT: 5047
      DATABASE_HOST: database
      DATABASE_PORT: '5432'
      DATABASE_NAME: soat_tutorials
      DATABASE_USER: soat_user
      DATABASE_PASSWORD: soat_password
      SECRETS_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      JWT_SECRET: tutorials-test-jwt-secret
      FILES_STORAGE_DIR: /data/files
      EMBEDDING_PROVIDER: ollama
      EMBEDDING_MODEL: qwen3-embedding:0.6b
      EMBEDDING_DIMENSIONS: '1024'
      OLLAMA_BASE_URL: http://ollama:11434
      NODE_OPTIONS: '--max-old-space-size=768'
      DEBUG: 'soat:*'
    healthcheck:
      test:
        - CMD
        - node
        - '-e'
        - >-
          require('http').get('http://localhost:5047/health',
          (r) => { process.exit(r.statusCode === 200 ? 0 : 1); }
          ).on('error', () => process.exit(1))
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 30s

  # ── Tutorial validator ───────────────────────────────────────────────────────
  # Runs all tutorials not listed in tests/.tutorialsignore.
  # Pass TUTORIAL_ID=<name> (without .md) to run a single tutorial, e.g.:
  #   TUTORIAL_ID=permissions docker compose -f tests/docker-compose.tutorials.yml up tutorials

  tutorials:
    build:
      context: ..
      target: smoke-test
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    depends_on:
      server:
        condition: service_healthy
      mock-providers:
        condition: service_healthy
    environment:
      SOAT_BASE_URL: 'http://server:5047'
      SOAT_WEBHOOK_BASE_URL: 'http://tutorials:8787'
      TUTORIAL_ID: '${TUTORIAL_ID:-}'
      VERBOSE: '0'
      # Point the converter tutorial's provider endpoints at the mock service.
      # The server (which makes the actual outbound calls) reaches these over the
      # compose network; dummy keys are ignored by the mocks.
      OPENAI_BASE_URL: 'http://mock-providers:8090/v1'
      OPENAI_API_KEY: 'test-openai-key'
      STT_URL: 'http://mock-providers:8090/v1/listen'
      DEEPGRAM_API_KEY: 'test-deepgram-key'
    volumes:
      - ../packages/website/docs/tutorials:/tutorials:ro
      - ./tutorials-tests.sh:/tutorials-tests.sh:ro
      - ./run-tutorials.sh:/run-tutorials.sh:ro
      - ./.tutorialsignore:/repo/tests/.tutorialsignore:ro
    command:
      - bash
      - -c
      - |
        export PATH="/app/node_modules/.bin:$$PATH"
        bash /run-tutorials.sh
