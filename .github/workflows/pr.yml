name: PR

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-and-deploy:
    name: Build, Test and Deploy
    runs-on: ubuntu-latest
    if: "!startsWith(github.head_ref, 'release/')"
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Docs lint (drift guardrail)
        run: pnpm run docs-lint

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Build, test and deploy
        run: pnpm turbo run build typecheck lint test deploy
        env:
          CARLIN_BRANCH: ${{ github.event.pull_request.head.ref }}

      - name: Deploy report
        run: pnpm carlin deploy report --channel=github-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CARLIN_BRANCH: ${{ github.event.pull_request.head.ref }}

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    if: "!startsWith(github.head_ref, 'release/')"

    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/share/swift
          docker system prune -af

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Ollama
        uses: ./.github/actions/setup-ollama

      - name: Run smoke tests
        run: pnpm run smoke-tests
        env:
          COMPOSE_BAKE: '1'

  tutorials-test:
    name: Tutorials Tests
    runs-on: ubuntu-latest
    if: "!startsWith(github.head_ref, 'release/')"

    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/share/swift
          docker system prune -af

      - name: Setup Ollama
        uses: ./.github/actions/setup-ollama

      - name: Run tutorials tests
        run: docker compose -f tests/docker-compose.tutorials.yml up --build --renew-anon-volumes --remove-orphans --abort-on-container-exit --exit-code-from tutorials

      - name: Cleanup tutorials stack
        if: always()
        run: docker compose -f tests/docker-compose.tutorials.yml down --volumes

  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs:
      - build-test-and-deploy
      - smoke-test
      - tutorials-test
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          for result in \
            "${{ needs.build-test-and-deploy.result }}" \
            "${{ needs.smoke-test.result }}" \
            "${{ needs.tutorials-test.result }}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "One or more jobs failed."
              exit 1
            fi
          done
          echo "All checks passed."
