name: PR

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-test-and-deploy:
    name: Build, Test and Deploy
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Build, test and deploy
        run: pnpm turbo run deploy

      - name: Deploy report
        run: pnpm turbo run deploy-report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CARLIN_BRANCH: ${{ github.event.pull_request.head.ref }}

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Ollama models
        uses: actions/cache@v5
        with:
          path: ~/.ollama/models
          key: ollama-models-qwen3-embedding-0.6b-qwen2.5-0.5b

      - name: Run smoke tests
        run: pnpm run smoke-test
        env:
          COMPOSE_BAKE: '1'

  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs:
      - build-test-and-deploy
      - smoke-test
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.build-test-and-deploy.result }}" != "success" || \
                "${{ needs.smoke-test.result }}" != "success" ]]; then
            echo "One or more jobs failed."
            exit 1
          fi
          echo "All checks passed."
