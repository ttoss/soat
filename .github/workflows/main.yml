name: Main

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, 'chore(release):') && github.ref_type != 'tag' }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and test
        run: pnpm turbo run build typecheck lint test

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, 'chore(release):') && github.ref_type != 'tag' }}

    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/share/swift
          docker system prune -af

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Ollama
        uses: ./.github/actions/setup-ollama

      - name: Run smoke tests
        run: pnpm run smoke-tests
        env:
          COMPOSE_BAKE: '1'

  push-release-tag:
    name: Push Release Tag
    runs-on: ubuntu-latest

    if: github.event.head_commit.message == 'chore(release): publish packages'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Read version from lerna.json
        id: version
        run: echo "version=$(node -e "console.log(require('./lerna.json').version)")" >> "$GITHUB_OUTPUT"

      - name: Push tag
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"


  release:
    name: Release
    needs: push-release-tag
    if: needs.push-release-tag.result == 'success'
    uses: ./.github/workflows/tag.yml
    secrets: inherit

  tutorials-test:
    name: Tutorials Tests
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, 'chore(release):') && github.ref_type != 'tag' }}

    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/share/swift
          docker system prune -af

      - name: Setup Ollama
        uses: ./.github/actions/setup-ollama

      - name: Run tutorials tests
        run: docker compose -f tests/docker-compose.tutorials.yml up --build --renew-anon-volumes --remove-orphans --abort-on-container-exit --exit-code-from tutorials

      - name: Cleanup tutorials stack
        if: always()
        run: docker compose -f tests/docker-compose.tutorials.yml down --volumes
