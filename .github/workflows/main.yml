name: Main

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  ENVIRONMENT: Production

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and test
        run: pnpm turbo run test

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Ollama models
        uses: actions/cache@v5
        with:
          path: ~/.ollama/models
          key: ollama-models-qwen3-embedding-0.6b-qwen2.5-0.5b

      - name: Cache Ollama Docker image
        id: cache-ollama-image
        uses: actions/cache@v5
        with:
          path: /tmp/ollama-image.tar
          key: ollama-docker-image-${{ hashFiles('docker-compose.test.yml') }}

      - name: Load Ollama Docker image from cache
        if: steps.cache-ollama-image.outputs.cache-hit == 'true'
        run: docker load -i /tmp/ollama-image.tar

      - name: Pull and save Ollama Docker image
        if: steps.cache-ollama-image.outputs.cache-hit != 'true'
        run: |
          docker pull ollama/ollama:0.20.6
          docker save ollama/ollama:0.20.6 -o /tmp/ollama-image.tar

      - name: Run smoke tests
        run: pnpm run smoke-tests
        env:
          COMPOSE_BAKE: '1'

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - build-and-test
      - smoke-test

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy
        run: pnpm turbo run deploy
        env:
          CARLIN_BRANCH: main
          CARLIN_ACM: ${{ vars.AWS_ACM }}
