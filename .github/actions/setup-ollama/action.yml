name: Setup Ollama
description: Cache Ollama models and Docker image, optionally delete stale image caches.

inputs:
  delete-stale-caches:
    description: Delete stale Ollama Docker image caches on a cache miss (set to 'true' on the main branch).
    required: false
    default: 'false'
  github-token:
    description: GitHub token used to delete stale caches (required when delete-stale-caches is true).
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Cache Ollama models
      uses: actions/cache@v5
      with:
        path: ~/.ollama/models
        key: ollama-models

    - name: Cache Ollama Docker image
      id: cache-ollama-image
      uses: actions/cache@v5
      with:
        path: /tmp/ollama-image.tar
        key: ollama-docker-image-${{ hashFiles('.github/actions/setup-ollama/action.yml') }}
        restore-keys: |
          ollama-docker-image-

    - name: Load Ollama Docker image from cache
      if: steps.cache-ollama-image.outputs.cache-hit == 'true'
      shell: bash
      run: docker load -i /tmp/ollama-image.tar

    - name: Delete stale Ollama Docker image caches
      if: steps.cache-ollama-image.outputs.cache-hit != 'true' && inputs.delete-stale-caches == 'true'
      shell: bash
      run: |
        gh cache list --key ollama-docker-image- --json id --jq '.[].id' \
          | xargs -r -I{} gh cache delete {}
      env:
        GH_TOKEN: ${{ inputs.github-token }}

    - name: Pull and save Ollama Docker image
      if: steps.cache-ollama-image.outputs.cache-hit != 'true'
      shell: bash
      run: |
        docker pull ollama/ollama:0.20.6
        docker save ollama/ollama:0.20.6 -o /tmp/ollama-image.tar
