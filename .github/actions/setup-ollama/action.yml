name: Setup Ollama
description: Cache Ollama models and ensure the Ollama Docker image is available.

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Cache Ollama models
      uses: actions/cache@v5
      with:
        path: ~/.ollama/models
        key: ollama-models

    - name: Ensure Ollama Docker image is available
      shell: bash
      run: |
        if ! docker image inspect ollama/ollama:0.20.6 &>/dev/null; then
          docker pull ollama/ollama:0.20.6
        fi
