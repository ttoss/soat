packages:
  - 'packages/*'
# Pinned out of `pnpm update`:
# - @stoplight/spectral-cli@6.16.1 pulls rollup@2.80.0, which trips the
#   no-downgrade trust policy below (possible package takeover). Keep the CLI at
#   its current version rather than weakening the trust guard; revisit once
#   spectral ships a release without the flagged rollup.
# - typescript@7.x (tsgo native port) breaks the toolchain: @hey-api/openapi-ts
#   (SDK generator) and @typescript-eslint/typescript-estree both fail against
#   it. Stay on 6.x until those support TS 7.
# - eslint held at 9.x: 10.x is not adopted yet in this repo's config stack.
updateConfig:
  ignoreDependencies:
    - '@stoplight/spectral-cli'
    - 'typescript'
    - 'eslint'
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - 'carlin'
  - '@ttoss/*'
  - 'pnpm'
blockExoticSubdeps: true
trustLockfile: true
trustPolicy: no-downgrade
trustPolicyExclude:
  # https://github.com/storybookjs/storybook/issues/34957
  # https://github.com/TypeStrong/fork-ts-checker-webpack-plugin/issues/895
  - chokidar
  # Docusaurus dependencies
  - detect-port
  # Relay/fbjs
  - ua-parser-js
  # tsdown, lint-staged, @commitlint/cli, @lerna-lite/core, Docusaurus mermaid path
  - tinyexec
  # semver@6.3.1 comes from Babel stack, especially @babel/core
  - semver
  - '@octokit/webhooks'
  - 'react-redux'
  - 'reselect'
  - 'undici-types'
  - '@ttoss/*'
  - carlin
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  aws-sdk: true
  core-js: true
  cpu-features: true
  esbuild: true
  msw: false
  postman-code-generators: false
  protobufjs: true
  ssh2: true
  unrs-resolver: true
