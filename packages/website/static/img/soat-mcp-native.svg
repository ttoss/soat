<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="mcpGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8e44ad"/>
      <stop offset="100%" stop-color="#1a73e8"/>
    </linearGradient>
  </defs>
  <!-- Left plug -->
  <rect x="20" y="78" width="54" height="44" rx="8" stroke="#8e44ad" stroke-width="2.5" fill="none"/>
  <rect x="30" y="88" width="10" height="6" rx="2" fill="#8e44ad" opacity="0.7"/>
  <rect x="30" y="106" width="10" height="6" rx="2" fill="#8e44ad" opacity="0.7"/>
  <!-- Left plug prongs -->
  <rect x="74" y="86" width="14" height="8" rx="3" fill="#8e44ad" opacity="0.8"/>
  <rect x="74" y="106" width="14" height="8" rx="3" fill="#8e44ad" opacity="0.8"/>
  <!-- Right socket -->
  <rect x="126" y="78" width="54" height="44" rx="8" stroke="#1a73e8" stroke-width="2.5" fill="none"/>
  <rect x="160" y="88" width="10" height="6" rx="2" fill="#1a73e8" opacity="0.7"/>
  <rect x="160" y="106" width="10" height="6" rx="2" fill="#1a73e8" opacity="0.7"/>
  <!-- Right socket holes -->
  <rect x="112" y="86" width="14" height="8" rx="3" stroke="#1a73e8" stroke-width="2" fill="none"/>
  <rect x="112" y="106" width="14" height="8" rx="3" stroke="#1a73e8" stroke-width="2" fill="none"/>
  <!-- Connection spark -->
  <circle cx="100" cy="90" r="2" fill="#00e5ff"/>
  <circle cx="100" cy="100" r="3" fill="#00e5ff" opacity="0.9"/>
  <circle cx="100" cy="110" r="2" fill="#00e5ff"/>
  <!-- Connection energy lines -->
  <line x1="88" y1="90" x2="94" y2="90" stroke="#00e5ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="106" y1="90" x2="112" y2="90" stroke="#00e5ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="88" y1="110" x2="94" y2="110" stroke="#00e5ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="106" y1="110" x2="112" y2="110" stroke="#00e5ff" stroke-width="1.5" opacity="0.6"/>
  <!-- Protocol label arc -->
  <path d="M50 48 Q100 28 150 48" stroke="url(#mcpGrad)" stroke-width="2" fill="none" opacity="0.5"/>
  <text x="100" y="42" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#8e44ad" opacity="0.8">MCP</text>
  <!-- Bottom signal waves -->
  <path d="M80 154 Q90 146 100 154 Q110 162 120 154" stroke="#00e5ff" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M72 166 Q90 154 100 166 Q110 178 128 166" stroke="#00e5ff" stroke-width="1.5" fill="none" opacity="0.35"/>
  <!-- Corner accents -->
  <circle cx="28" cy="62" r="2" fill="#00e5ff" opacity="0.5"/>
  <circle cx="172" cy="62" r="2" fill="#00e5ff" opacity="0.5"/>
  <circle cx="28" cy="138" r="2" fill="#8e44ad" opacity="0.4"/>
  <circle cx="172" cy="138" r="2" fill="#1a73e8" opacity="0.4"/>
</svg>
