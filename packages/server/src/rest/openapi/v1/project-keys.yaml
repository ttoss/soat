openapi: 3.0.3
info:
  title: SOAT Project Keys API
  version: 1.0.0
  description: API for managing project API keys (Project Keys resource)
  contact:
    name: SOAT Team
    url: https://github.com/ttoss/soat
servers:
  - url: https://{host}/api/v1
    description: Production (HTTPS)
    variables:
      host:
        description: The hostname of your SOAT deployment
        example: your-soat.com
        default: your-soat.com
  - url: http://{host}/api/v1
    description: Development (HTTP)
    variables:
      host:
        description: The hostname of your SOAT deployment
        example: localhost:5047
        default: localhost:5047
paths:
  /project-keys:
    post:
      tags:
        - Project Keys
      summary: Create a project key
      description: Creates a new API key for programmatic access to a project
      operationId: createProjectKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - project_id
                - policy_id
                - name
              properties:
                project_id:
                  type: string
                  description: Project ID
                  example: proj_V1StGXR8Z5jdHi6B
                policy_id:
                  type: string
                  description: Policy ID that determines the key's permissions
                  example: policy_abc123
                name:
                  type: string
                  description: Key name for identification
                  example: CI/CD Pipeline
      responses:
        '201':
          description: Project key created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: The API key ID (to use as bearer token)
                    example: SDK_V1StGXR8Z5jdHi6B
                  name:
                    type: string
                  project_id:
                    type: string
                  created_at:
                    type: string
                    format: date-time
        '400':
          description: Bad request (missing fields, invalid project/policy)
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (not a project member)
        '500':
          description: Internal server error
  /project-keys/{id}:
    get:
      tags:
        - Project Keys
      summary: Get a project key
      description: Returns details of a project key
      operationId: getProjectKey
      parameters:
        - name: id
          in: path
          required: true
          description: Project key ID
          schema:
            type: string
            example: SDK_V1StGXR8Z5jdHi6B
      responses:
        '200':
          description: Project key details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  project_id:
                    type: string
                  created_at:
                    type: string
                    format: date-time
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (not the key owner)
        '404':
          description: Project key not found
    put:
      tags:
        - Project Keys
      summary: Update a project key
      description: Updates an existing project key's policy
      operationId: updateProjectKey
      parameters:
        - name: id
          in: path
          required: true
          description: Project key ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - policy_id
              properties:
                policy_id:
                  type: string
                  description: New policy ID
      responses:
        '200':
          description: Project key updated successfully
        '400':
          description: Bad request (invalid policy)
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (not the key owner)
        '404':
          description: Project key not found
    delete:
      tags:
        - Project Keys
      summary: Delete a project key
      description: Deletes a project key
      operationId: deleteProjectKey
      parameters:
        - name: id
          in: path
          required: true
          description: Project key ID
          schema:
            type: string
      responses:
        '200':
          description: Project key deleted successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (not the key owner)
        '404':
          description: Project key not found
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
