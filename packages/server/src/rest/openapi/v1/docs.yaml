openapi: 3.0.3
info:
  title: SOAT Docs API
  version: 1.0.0
  description: Access SOAT platform documentation via llms.txt
  contact:
    name: SOAT Team
    url: https://github.com/ttoss/soat
servers:
  - url: '{baseUrl}'
    description: Base URL of your SOAT deployment (e.g. https://your-soat.com or http://localhost:5047)
    variables:
      baseUrl:
        description: The base URL of your SOAT deployment
        default: http://localhost:5047
tags:
  - name: Docs
    description: SOAT platform documentation
security:
  - bearerAuth: []
paths:
  /api/v1/docs:
    get:
      tags:
        - Docs
      summary: Get documentation index
      description: Returns the SOAT documentation index in llms.txt format. The response contains a Markdown document listing all available documentation pages with their URLs. Use the URLs from this index with `get-doc-page` to fetch individual page content.
      operationId: getDocs
      x-iam-action: docs:GetDocs
      responses:
        '200':
          description: Documentation index content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocsIndex'
        '401':
          description: Unauthorized
        '404':
          description: Documentation index unavailable
  /api/v1/docs/page:
    get:
      tags:
        - Docs
      summary: Get documentation page
      description: Fetches the content of a specific SOAT documentation page by URL. Use `get-docs` first to discover available page URLs from the documentation index.
      operationId: getDocPage
      x-iam-action: docs:GetDocPage
      parameters:
        - name: url
          in: query
          required: true
          description: Full URL of the documentation page (must be from the SOAT documentation site, as listed in the index returned by `get-docs`)
          schema:
            type: string
            example: https://soat.ttoss.dev/docs/modules/agents
      responses:
        '200':
          description: Documentation page content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocPage'
        '400':
          description: Missing or invalid url parameter
        '401':
          description: Unauthorized
        '404':
          description: Documentation page not found or URL not from allowed domain
components:
  schemas:
    DocsIndex:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          description: Documentation index in llms.txt Markdown format, listing all available pages and their URLs
    DocPage:
      type: object
      required:
        - url
        - content
      properties:
        url:
          type: string
          description: URL of the documentation page that was fetched
          example: https://soat.ttoss.dev/docs/modules/agents
        content:
          type: string
          description: Full content of the documentation page
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
