                    ai_provider_id:
                      x-soat-ref: ai-providers
                      type: string
                      description: AI provider override for extraction calls. Must belong to the agent's project. Its default_model becomes the model fallback.
                    model:
                      type: string
                      description: Model override for extraction calls.
                    prompt:
                      type: string
                      description: Replaces the default task instructions. The JSON response contract and the conversation transcript are always appended by the server.
        reasoning:
          type: object
          nullable: true
          description: 'Deep-thinking configuration. `effort` forwards provider-native reasoning; `mode: pipeline` runs an ordered list of reasoning steps after the base draft. reflect and debate are expressed as pipelines — see the Agents module docs.'
          properties:
            effort:
              type: string
              enum: [low, medium, high]
              description: Provider-native reasoning effort, forwarded to providers that support it (OpenAI reasoning models, Anthropic extended thinking, Google thinking budgets). Ignored elsewhere.
            mode:
              type: string
              enum: [none, pipeline]
              description: 'Orchestrated reasoning strategy. `pipeline` runs an ordered list of reasoning steps after the base draft.'
            steps:
              type: array
              maxItems: 8
              description: 'Pipeline only — ordered reasoning steps run after the base draft. The output step (`output: true`, else the last) produces the final answer. Prompts support `{question}`, `{draft}`, and `{steps.<name>}`. reflect and debate are expressed as step configs — see the Agents module docs.'
              items:
                type: object
                required:
                  - name
                  - prompt
                properties:
                  name:
                    type: string
                    description: Unique step name; referenced as `{steps.<name>}`.
                  kind:
                    type: string
                    enum: [completion, fanout]
                    description: '`completion` (default) runs one call; `fanout` runs N perspectives over rounds.'
                  prompt:
                    type: string
                    description: 'Prompt template supporting `{question}`, `{draft}`, and `{steps.<name>}`.'
                  ai_provider_id:
                    x-soat-ref: ai-providers
                    type: string
                    description: AI provider override for this step. Must belong to the agent's project.
                  model:
                    type: string
                    description: Model override for this step.
                  temperature:
                    type: number
                    description: Sampling temperature for this step.
                  output:
                    type: boolean
                    description: Marks the step whose output is the final answer (else the last step).
                  halt_if_equals:
                    type: string
                    description: If the step output equals this string, halt the pipeline and keep the draft.
                  count:
                    type: integer
                    minimum: 2
                    maximum: 5
                    description: 'Fanout only — number of auto-named perspectives (2–5).'
                  rounds:
                    type: integer
                    minimum: 1
                    maximum: 3
                    description: 'Fanout only — rounds of perspective turns (default 1, max 3).'
                  perspectives:
                    type: array
                    description: 'Fanout only — explicit perspective objects; overrides count.'
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        prompt:
                          type: string
                        ai_provider_id:
                          x-soat-ref: ai-providers
                          type: string
                        model:
                          type: string
        output_schema:
          type: object
          nullable: true
          description: 'JSON Schema describing the structured object the model must return. When set, non-streaming generations use the AI SDK to constrain output to this schema; the parsed value is returned as `output.object` in the generation response. See the Structured Output section in the Agents module docs.'
        max_context_messages:
          type: integer
          nullable: true
          description: Maximum number of recent messages included in the context window. Null means no limit.
        single_session_per_actor:
          type: boolean
          nullable: true
          description: When true, only one open session per actor_id is allowed for this agent.

    CreateAgentGenerationRequest:
      type: object
      required:
        - messages
      properties:
        messages:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: false
            required:
              - role
              - content
            properties:
              role:
                type: string
                enum:
                  - system
                  - user
                  - assistant
              content:
                oneOf:
                  - type: string
                  - $ref: '#/components/schemas/ToolOutputMessageContent'
                  - $ref: '#/components/schemas/DocumentMessageContent'
        stream:
          type: boolean
          default: false
          description: When true the response is an SSE stream
        trace_id:
          x-soat-ref: traces
          type: string
          x-soat-server-managed: true
          description: Optional trace ID to group generations
        parent_trace_id:
          x-soat-ref: traces
          type: string
          nullable: true
          x-soat-server-managed: true
          description: The trace ID of the parent agent generation that triggered this one (for agent-to-agent calls)
        root_trace_id:
          x-soat-ref: traces
          type: string
          nullable: true
          x-soat-server-managed: true
          description: The trace ID of the root generation in the call chain; if omitted, this generation is the root
        max_call_depth:
          type: integer
          minimum: 0
          default: 10
          x-soat-server-managed: true
          description: Maximum nested agent-call depth; 0 short-circuits with a depth-guard response
        tool_context:
          type: object
          additionalProperties:
            type: string
          nullable: true
          description: Key-value pairs injected as context headers into all tool call requests made during this generation.
        reasoning:
          type: object
          nullable: true
          description: Per-generation deep-thinking override. Replaces the agent's stored reasoning config for this request (object replace, not merge). Same shape as the agent `reasoning` field.
          properties:
            effort:
              type: string
              enum: [low, medium, high]
              description: Provider-native reasoning effort for this generation.
            mode:
              type: string
              enum: [none, pipeline]
              description: Orchestrated reasoning strategy for this generation.
            steps:
              type: array
              maxItems: 8
              description: 'Pipeline only — ordered reasoning steps for this generation. The output step (`output: true`, else the last) produces the final answer. Prompts support `{question}`, `{draft}`, and `{steps.<name>}`.'
              items:
                type: object
                required:
                  - name
                  - prompt
                properties:
                  name:
                    type: string
                    description: Unique step name; referenced as `{steps.<name>}`.
                  kind:
                    type: string
                    enum: [completion, fanout]
                    description: '`completion` (default) runs one call; `fanout` runs N perspectives over rounds.'
                  prompt:
                    type: string
                    description: 'Prompt template supporting `{question}`, `{draft}`, and `{steps.<name>}`.'
                  ai_provider_id:
                    x-soat-ref: ai-providers
                    type: string
                    description: AI provider override for this step. Must belong to the agent's project.
                  model:
                    type: string
                    description: Model override for this step.
                  temperature:
                    type: number
                    description: Sampling temperature for this step.
                  output:
                    type: boolean
                    description: Marks the step whose output is the final answer (else the last step).
                  halt_if_equals:
                    type: string
                    description: If the step output equals this string, halt the pipeline and keep the draft.
                  count:
                    type: integer
                    minimum: 2
                    maximum: 5
                    description: 'Fanout only — number of auto-named perspectives (2–5).'
                  rounds:
                    type: integer
                    minimum: 1
                    maximum: 3
                    description: 'Fanout only — rounds of perspective turns (default 1, max 3).'
                  perspectives:
                    type: array
                    description: 'Fanout only — explicit perspective objects; overrides count.'
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        prompt:
                          type: string
                        ai_provider_id:
                          x-soat-ref: ai-providers
                          type: string
                        model:
                          type: string

    ToolOutputMessageContent:
      type: object
      required:
        - type
        - tool_id
      properties:
        type:
          type: string
          enum:
            - tool_output
        tool_id:
          x-soat-ref: tools
          type: string
          description: Public ID of the tool to execute before generation.
        action:
          type: string
          nullable: true
          description: Optional action name for tools that require action selection (for example soat and mcp tools).
        input:
          type: object
          nullable: true
          additionalProperties: true
          description: Input payload passed to the tool call.
        output_path:
          type: string
          nullable: true
          description: Optional dot-notation path used to extract a value from the tool output.

    DocumentMessageContent:
      type: object
      required:
        - type
        - document_id
      properties:
        type:
          type: string
          enum:
            - document
        document_id:
          x-soat-ref: documents
          type: string
          description: Public ID of a document to use as the message content.

    SubmitToolOutputsRequest:
      type: object
      required:
        - tool_outputs
      properties:
        tool_outputs:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - tool_call_id
              - output
            properties:
              tool_call_id:
                type: string
                description: ID of the tool call to respond to
              output:
                description: Result of the tool execution

    AgentGenerationResponse:
      type: object
      properties:
        id:
          type: string
          description: Public ID of the generation
          example: agt_gen_V1StGXR8Z5jdHi6B
        status:
          type: string
          enum:
            - completed
            - requires_action
          description: Generation status
        text:
          type: string
          nullable: true
          description: Final text output (when completed)
        object:
          type: object
          nullable: true
          description: Structured object matching the agent's `output_schema` (when completed and `output_schema` is set)
        tool_calls:
          type: array
          nullable: true
          items:
            type: object
            properties:
              tool_call_id:
                type: string
              tool_name:
                type: string
              args:
                type: object
          description: Pending tool calls (when requires_action)

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          oneOf:
            - type: string
              description: Generic error message (e.g. "Unauthorized" or "Internal Server Error")
              example: Unauthorized
            - type: object
              description: Structured domain error
              properties:
                code:
                  type: string
                  example: AI_PROVIDER_ERROR
                message:
                  type: string
                  example: 'Provider returned 402: insufficient credits'
                meta:
                  type: object
