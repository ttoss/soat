            effort:
              type: string
              enum: [low, medium, high]
              description: Provider-native reasoning effort, forwarded to providers that support it (OpenAI reasoning models, Anthropic extended thinking, Google thinking budgets). Ignored elsewhere.
            mode:
              type: string
              enum: [none, reflect, debate]
              description: 'Orchestrated reasoning strategy. `reflect` drafts, critiques, and revises. `debate` runs multiple perspectives then synthesizes.'
            critique:
              type: object
              description: Reflect only — overrides for the critique pass.
              properties:
                ai_provider_id:
                  type: string
                  description: AI provider override for the critique call. Must belong to the agent's project.
                model:
                  type: string
                  description: Model override for the critique call.
                prompt:
                  type: string
                  description: Replaces the default critique instructions.
            perspectives:
              description: 'Debate only — number of auto-generated perspectives (2–5) or an array of explicit perspective objects.'
              oneOf:
                - type: integer
                - type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      prompt:
                        type: string
                      ai_provider_id:
                        type: string
                      model:
                        type: string
            max_rounds:
              type: integer
              description: Debate only — rounds of perspective turns. Default 1, max 3.
            synthesis:
              type: object
              description: Debate only — override triple for the synthesis pass.
              properties:
                ai_provider_id:
                  type: string
                  description: AI provider override for the synthesis call. Must belong to the agent's project.
                model:
                  type: string
                  description: Model override for the synthesis call.
                prompt:
                  type: string
                  description: Replaces the default synthesis instructions.
        max_context_messages:
          type: integer
          nullable: true
          description: Maximum number of recent messages included in the context window. Null means no limit.
        single_session_per_actor:
          type: boolean
          nullable: true
          description: When true, only one open session per actor_id is allowed for this agent.

    CreateAgentGenerationRequest:
      type: object
      required:
        - messages
      properties:
        messages:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: false
            required:
              - role
              - content
            properties:
              role:
                type: string
                enum:
                  - system
                  - user
                  - assistant
              content:
                oneOf:
                  - type: string
                  - $ref: '#/components/schemas/ToolOutputMessageContent'
                  - $ref: '#/components/schemas/DocumentMessageContent'
        stream:
          type: boolean
          default: false
          description: When true the response is an SSE stream
        trace_id:
          type: string
          x-soat-server-managed: true
          description: Optional trace ID to group generations
        parent_trace_id:
          type: string
          nullable: true
          x-soat-server-managed: true
          description: The trace ID of the parent agent generation that triggered this one (for agent-to-agent calls)
        root_trace_id:
          type: string
          nullable: true
          x-soat-server-managed: true
          description: The trace ID of the root generation in the call chain; if omitted, this generation is the root
        max_call_depth:
          type: integer
          minimum: 0
          default: 10
          x-soat-server-managed: true
          description: Maximum nested agent-call depth; 0 short-circuits with a depth-guard response
        tool_context:
          type: object
          additionalProperties:
            type: string
          nullable: true
          description: Key-value pairs injected as context headers into all tool call requests made during this generation.
        reasoning:
          type: object
          nullable: true
          description: Per-generation deep-thinking override. Replaces the agent's stored reasoning config for this request (object replace, not merge). Same shape as the agent `reasoning` field.
          properties:
            effort:
              type: string
              enum: [low, medium, high]
              description: Provider-native reasoning effort for this generation.
            mode:
              type: string
              enum: [none, reflect, debate]
              description: Orchestrated reasoning strategy for this generation.
            critique:
              type: object
              description: Reflect only — overrides for the critique pass.
              properties:
                ai_provider_id:
                  type: string
                  description: AI provider override for the critique call. Must belong to the agent's project.
                model:
                  type: string
                  description: Model override for the critique call.
                prompt:
                  type: string
                  description: Replaces the default critique instructions.
            perspectives:
              description: 'Debate only — number of auto-generated perspectives (2–5) or an array of explicit perspective objects.'
              oneOf:
                - type: integer
                - type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      prompt:
                        type: string
                      ai_provider_id:
                        type: string
                      model:
                        type: string
            max_rounds:
              type: integer
              description: Debate only — rounds of perspective turns. Default 1, max 3.
            synthesis:
              type: object
              description: Debate only — override triple for the synthesis pass.
              properties:
                ai_provider_id:
                  type: string
                  description: AI provider override for the synthesis call. Must belong to the agent's project.
                model:
                  type: string
                  description: Model override for the synthesis call.
                prompt:
                  type: string
                  description: Replaces the default synthesis instructions.

    ToolOutputMessageContent:
      type: object
      required:
        - type
        - tool_id
      properties:
        type:
          type: string
          enum:
            - tool_output
        tool_id:
          type: string
          description: Public ID of the tool to execute before generation.
        action:
          type: string
          nullable: true
          description: Optional action name for tools that require action selection (for example soat and mcp tools).
        input:
          type: object
          nullable: true
          additionalProperties: true
          description: Input payload passed to the tool call.
        output_path:
          type: string
          nullable: true
          description: Optional dot-notation path used to extract a value from the tool output.

    DocumentMessageContent:
      type: object
      required:
        - type
        - document_id
      properties:
        type:
          type: string
          enum:
            - document
        document_id:
          type: string
          description: Public ID of a document to use as the message content.

    SubmitToolOutputsRequest:
      type: object
      required:
        - tool_outputs
      properties:
        tool_outputs:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - tool_call_id
              - output
            properties:
              tool_call_id:
                type: string
                description: ID of the tool call to respond to
              output:
                description: Result of the tool execution

    AgentGenerationResponse:
      type: object
      properties:
        id:
          type: string
          description: Public ID of the generation
          example: agt_gen_V1StGXR8Z5jdHi6B
        status:
          type: string
          enum:
            - completed
            - requires_action
          description: Generation status
        text:
          type: string
          nullable: true
          description: Final text output (when completed)
        tool_calls:
          type: array
          nullable: true
          items:
            type: object
            properties:
              tool_call_id:
                type: string
              tool_name:
                type: string
              args:
                type: object
          description: Pending tool calls (when requires_action)

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          oneOf:
            - type: string
              description: Generic error message (e.g. "Unauthorized" or "Internal Server Error")
              example: Unauthorized
            - type: object
              description: Structured domain error
              properties:
                code:
                  type: string
                  example: AI_PROVIDER_ERROR
                message:
                  type: string
                  example: 'Provider returned 402: insufficient credits'
                meta:
                  type: object
