services:
  database:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    container_name: soat-database-dev-docker
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-soat_dev}
      POSTGRES_USER: ${DATABASE_USER:-soat_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-soat_password}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DATABASE_USER:-soat_user} -d ${DATABASE_NAME:-soat_dev}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: soat-ollama-dev-docker
    logging:
      driver: 'none'
    volumes:
      - ollama_cache:/root/.ollama
    entrypoint:
      - /bin/sh
      - -c
      - 'ollama serve > /dev/null 2>&1 & sleep 5 && ollama pull qwen3-embedding:0.6b > /dev/null 2>&1 && ollama pull qwen2.5:0.5b > /dev/null 2>&1 && wait'
    healthcheck:
      test: ['CMD-SHELL', 'ollama list | grep qwen3-embedding']
      interval: 10s
      timeout: 30s
      retries: 30
      start_period: 30s

  server:
    build: .
    container_name: soat-server-dev-docker
    depends_on:
      database:
        condition: service_healthy
      ollama:
        condition: service_healthy
    ports:
      - '5047:5047'
    environment:
      SOAT_ADMIN_USERNAME: admin
      SOAT_ADMIN_PASSWORD: adminpassword
      DATABASE_HOST: database
      DATABASE_PORT: '5432'
      DATABASE_NAME: ${DATABASE_NAME:-soat_dev}
      DATABASE_USER: ${DATABASE_USER:-soat_user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-soat_password}
      SECRETS_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      FILES_STORAGE_DIR: /data/files
      OLLAMA_BASE_URL: http://ollama:11434
      EMBEDDING_PROVIDER: ollama
      EMBEDDING_MODEL: qwen3-embedding:0.6b
      EMBEDDING_DIMENSIONS: '1024'
    volumes:
      - files_data:/data/files

volumes:
  postgres_data:
  ollama_cache:
  files_data:
