<!-- @dsCard group="Spacing" viewport="700x160" name="Corner radii" subtitle="Soft, engineered corners — md (8px) is the workhorse" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 22px 24px; }
  .row { display: flex; gap: 18px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 64px; height: 56px; background: var(--surface-raised); border: 1px solid var(--border-strong); }
  .lbl { font: 500 11px/1.3 var(--font-mono); color: var(--text-muted); text-align: center; }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="lbl">xs · 4</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="lbl">md · 8</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="lbl">lg · 12</div></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><div class="lbl">xl · 16</div></div>
  <div class="item"><div class="box" style="border-radius:999px"></div><div class="lbl">full</div></div>
</div>
</body>
</html>
