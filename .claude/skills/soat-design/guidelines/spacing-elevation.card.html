<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation & glow" subtitle="Soft shadows in light; luminous glow in dark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 26px 24px; }
  .row { display: flex; gap: 26px; align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 84px; height: 56px; background: var(--surface-page); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); }
  .dark { background: #080c14; }
  .lbl { font: 500 11px/1.3 var(--font-mono); color: var(--text-muted); }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="box" style="box-shadow:0 2px 8px rgba(26,31,44,0.08)"></div><div class="lbl">shadow-sm</div></div>
  <div class="item"><div class="box" style="box-shadow:0 4px 16px rgba(26,31,44,0.1)"></div><div class="lbl">shadow-md</div></div>
  <div class="item"><div class="box" style="box-shadow:0 12px 32px rgba(26,31,44,0.12)"></div><div class="lbl">shadow-lg</div></div>
  <div class="item"><div class="box dark" style="box-shadow:0 0 20px rgba(0,229,255,0.3)"></div><div class="lbl">glow-md</div></div>
  <div class="item"><div class="box dark" style="box-shadow:0 0 30px rgba(0,229,255,0.5)"></div><div class="lbl">glow-lg</div></div>
</div>
</body>
</html>
