<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 20px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-default); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; }
  .name { font: 600 13px/1.3 var(--font-display); color: var(--text-strong); letter-spacing: 0.02em; }
  .hex { font: 500 12px/1.5 var(--font-mono); color: var(--text-muted); text-transform: uppercase; }
  .note { font: 400 11px/1.4 var(--font-body); color: var(--text-faint); margin-top: 2px; }
</style>
</head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#8e44ad"></div><div class="meta"><div class="name">Deep Violet</div><div class="hex">#8E44AD</div><div class="note">Depth, gradients, accents</div></div></div>
  <div class="sw"><div class="chip" style="background:#1a73e8"></div><div class="meta"><div class="name">Electric Blue</div><div class="hex">#1A73E8</div><div class="note">Functional primary — light</div></div></div>
  <div class="sw"><div class="chip" style="background:#00e5ff"></div><div class="meta"><div class="name">Core Cyan</div><div class="hex">#00E5FF</div><div class="note">The glow — dark primary</div></div></div>
</div>
</body>
</html>
