<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 22px 24px; }
  .code { font: 400 15px/1.7 var(--font-mono); color: var(--text-body); background: var(--surface-code); border: 1px solid var(--border-default); border-radius: var(--radius-lg); padding: 14px 16px; }
  .k { color: var(--color-primary); }
  .s { color: #a5d6ff; }
  .meta { font: 500 12px/1.5 var(--font-mono); color: var(--text-faint); margin-top: 12px; }
</style>
</head>
<body>
<div class="code"><span class="k">soat</span> create-agent --name <span class="s">"support-bot"</span></div>
<p class="meta">JetBrains Mono · 400 / 500 / 600 — 0.92em in flowing text</p>
</body>
</html>
