<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { padding: 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 28px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 16px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Input, Switch } = window.SOATDesignSystem_de1198;
  function Demo() {
    const [a, setA] = React.useState(true);
    const [b, setB] = React.useState(false);
    return (
      <div className="grid">
        <div className="stack">
          <Input label="Project name" placeholder="my-first-project" />
          <Input label="API base URL" defaultValue="http://localhost:5047" hint="Defaults to the local server port" />
        </div>
        <div className="stack">
          <Input label="Encryption key" type="password" defaultValue="0123456789abcdef" error="Use a stronger value before production" />
          <div style={{ display: 'flex', flexDirection: 'column', gap: '12px', paddingTop: '4px' }}>
            <Switch checked={a} onChange={setA} label="Persist session memory" />
            <Switch checked={b} onChange={setB} label="Fire webhook on completion" />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
